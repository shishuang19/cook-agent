<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitchen Orbit / 问答交互</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="orbit-body orbit-grid">
    <main class="mx-auto min-h-screen w-full max-w-7xl px-5 py-5 pb-[220px] lg:px-8 lg:pb-[200px]">
      <div class="grid gap-5 lg:grid-cols-[300px_minmax(0,1fr)]">
        <aside class="glass-panel rounded-[30px] p-5 lg:p-6">
          <div class="mb-8 flex items-start justify-between">
            <div>
              <p class="eyebrow mb-2">Kitchen Orbit</p>
              <h1 class="text-2xl font-semibold text-stone-100">问答交互页</h1>
            </div>
            <a class="orbit-chip" href="./index.html">返回</a>
          </div>

          <section>
            <div class="mb-3 flex items-center justify-between">
              <h2 class="text-sm font-medium uppercase tracking-[0.28em] text-stone-400">快捷问题</h2>
              <span class="status-dot"></span>
            </div>
            <div id="suggestion-list" class="flex flex-wrap gap-2"></div>
          </section>
        </aside>

        <section class="glass-panel flex min-h-[80vh] max-h-[calc(100vh-40px)] flex-col overflow-hidden rounded-[30px] p-4 lg:p-5">
          <div id="chat-messages" class="min-h-0 flex-1 space-y-4 overflow-y-auto px-1 pb-4"></div>
        </section>
      </div>

      <div class="pointer-events-none fixed inset-x-0 bottom-4 z-30 px-5 lg:px-8">
        <div class="mx-auto w-full max-w-7xl">
          <div class="grid gap-5 lg:grid-cols-[300px_minmax(0,1fr)]">
            <div class="hidden lg:block"></div>
            <div class="pointer-events-auto rounded-[24px] border border-white/10 bg-[rgba(25,20,20,0.86)] p-4 backdrop-blur">
              <div class="mb-3 flex flex-wrap items-center gap-3 text-xs uppercase tracking-[0.24em] text-stone-400">
                <span>Ask Anything</span>
                <span class="inline-flex items-center gap-2">
                  <span class="status-dot"></span>
                  本地演示可用
                </span>
              </div>
              <div class="flex flex-col gap-3 lg:flex-row">
                <textarea
                  id="chat-input"
                  rows="3"
                  class="orbit-textarea min-h-[112px] flex-1"
                  placeholder="例如：今天吃什么？最好 30 分钟内能做完，口味清淡一点。"
                ></textarea>
                <div class="flex w-full flex-col gap-3 lg:w-[220px]">
                  <button id="send-button" class="orbit-button h-[56px] w-full">发送问题</button>
                  <p class="text-xs leading-6 text-stone-500">
                    可通过 URL 参数覆盖地址，例如 ?apiBaseUrl=http://localhost:8080
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>
      window.KITCHEN_ORBIT_CONFIG = {
        apiBaseUrl: "",
        autoConnectApi: true,
        sessionEndpoint: "/api/session",
        chatEndpoint: "/api/chat",
        chatStreamEndpoint: "/api/chat/stream",
        fallbackToMock: false,
      };
    </script>
    <script src="./assets/app.js"></script>
    <script>
      window.KitchenOrbit.initQA();
    </script>
  </body>
</html>

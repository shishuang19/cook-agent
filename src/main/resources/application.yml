spring:
  application:
    name: cook-agent
  ai:
    openai:
      api-key: ${app.llm.api-key:}
      base-url: ${app.llm.base-url:https://api.openai.com}
      chat:
        options:
          model: ${app.llm.model:gpt-4o-mini}
          temperature: ${app.llm.temperature:0.3}
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cook_agent;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  flyway:
    enabled: false
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.ss.cookagent.api.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  storage:
    mode: memory
  llm:
    enabled: true
    base-url: https://dashscope.aliyuncs.com/compatible-mode
    api-key: ${QWEN_API_KEY:}
    model: qwen-plus
    temperature: ${LLM_TEMPERATURE:0.3}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
    mock-enabled: ${LLM_MOCK_ENABLED:false}
  data:
    cook-root: docs/cook
  memory:
    chat-window-size: ${CHAT_WINDOW_SIZE:6}
    summary-max-chars: ${SUMMARY_MAX_CHARS:500}
    persistence:
      enabled: ${MEMORY_PERSIST_ENABLED:true}
      file-path: ${MEMORY_PERSIST_FILE:target/session-memory/sessions.kryo}
  agent:
    react:
      max-steps: ${REACT_MAX_STEPS:2}
  search:
    hybrid:
      enabled: true
      single-char-variant: true
      chunk-score-weight: 0.70
      chunk-hit-bonus-step: 0.05
      chunk-hit-bonus-max-count: 5
      metadata-score-weight: 0.40
      candidate-limit: 200
